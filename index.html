<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Swapp</title>

  <!-- Design tokens + base styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/screens/auth.css">
  <link rel="stylesheet" href="css/screens/swipe.css">
  <link rel="stylesheet" href="css/screens/addItem.css">
  <link rel="stylesheet" href="css/screens/match.css">
  <link rel="stylesheet" href="css/screens/chat.css">
  <link rel="stylesheet" href="css/screens/matches.css">
  <link rel="stylesheet" href="css/screens/activity.css">
  <link rel="stylesheet" href="css/screens/profile.css">
  <link rel="stylesheet" href="css/screens/settings.css">
  <link rel="stylesheet" href="css/screens/cancel.css">
  <link rel="stylesheet" href="css/screens/rate.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Google Fonts: Quicksand (headings) + Karla (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- Global loading spinner -->
  <div id="global-spinner" class="spinner hidden" aria-hidden="true"></div>

  <!-- Offline banner -->
  <div id="offline-banner" class="offline-banner hidden" role="alert">
    Connection lost. Retrying…
  </div>

  <!-- Boot splash — covers the flash until session is resolved -->
  <div id="boot-splash">
    <div class="boot-logo">swapp</div>
  </div>

  <!-- App shell: auth view vs main app -->
  <div id="auth-view" class="screen-wrapper hidden"></div>

  <div id="main-app" class="hidden">
    <!-- Desktop: 3-column grid. Mobile: single panel switched by router -->
    <div id="main-app-viewport">
      <div id="left-nav-panel"></div>
      <div id="center-swipe-panel"></div>
      <div id="right-chat-panel"></div>
    </div>

    <!-- Bottom tab bar (shown on swipe, matches, addItem, activity, profile) -->
    <nav id="tab-bar" class="tab-bar hidden"></nav>
  </div>

  <!-- Match overlay (full-screen, shown on cross-match) -->
  <div id="match-overlay" class="hidden"></div>

  <!-- City selection modal (shown on first login if home_city is null) -->
  <div id="city-modal-overlay" class="modal-overlay hidden"></div>

  <!-- Full-screen photo viewer -->
  <div id="photo-viewer" class="photo-viewer hidden"></div>

  <!-- Supabase client (ESM from CDN — replace with bundler import when adding build step) -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    window.__supabaseFactory = createClient;
  </script>

  <!-- App modules -->
  <script type="module" src="js/app.js"></script>
  <script>
    // Re-run Lucide icon replacement after every render cycle
    document.addEventListener('lucide:init', () => {});
    window.__lucide = () => { if (window.lucide) window.lucide.createIcons(); };
  </script>
</body>
</html>
